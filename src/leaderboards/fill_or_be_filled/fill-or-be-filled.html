<!-- fill-or-be-filled.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fill or be Filled – Leaderboard</title>
    <link rel="stylesheet" href="fill-or-be-filled.css" />
</head>
<body>


    <header class="header">
        <button class="back-btn" onclick="location.href='/src/homepage.html'">← Homepage</button>
        <h1>Fill or be Filled Cup</h1>
    </header>


    <main class="container">


    <!-- Streamer Hosts -->
    <section class="hosts">


    <div class="streamer-card">
        <div class="streamer-profile">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/d198b8bb-c8aa-414c-be8a-c431e581ffdf-profile_image-300x300.jpeg" alt="Streamer One" />
        </div>
        <div class="streamer-info">
            <h2>Host: <span>Kuhrxmi</span></h2>
            <a href="https://twitch.tv/kuhrxmi" target="_blank">Watch on Twitch</a>
        </div>
        <div class="streamer-player">
            <iframe
            src="https://player.twitch.tv/?channel=kuhrxmi&parent=fort-leaderboard.com"
            allowfullscreen
            scrolling="no"></iframe>
        </div>
    </div>


    <div class="streamer-card">
        <div class="streamer-profile">
            <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/9bd5fe34-28f4-4bd0-bbbb-1ad5140b80a3-profile_image-300x300.png" alt="Streamer Two" />
        </div>
        <div class="streamer-info">
            <h2>Host: <span>Sherlynttv</span></h2>
            <a href="https://twitch.tv/sherlynttv" target="_blank">Watch on Twitch</a>
        </div>
        <div class="streamer-player">
            <iframe
            src="https://player.twitch.tv/?channel=sherlynttv&parent=fort-leaderboard.com"
            allowfullscreen
            scrolling="no"></iframe>
        </div>
    </div>


    </section>

    <!-- Leaderboard -->
    <section class="leaderboard">
        <div class="leaderboard-header">
            <span>Placement</span>
            <span>Players</span>
            <span>Score</span>
        </div>


        <div id="leaderboard-body"></div>
    </section>


    </main>


    <footer class="footer">
        <button class="back-btn" onclick="location.href='/src/homepage.html'">← Homepage</button>
    </footer>

    <div id="heart-container"></div>
    <audio id="refreshSound" src="\assets\anime-wow-sound-effect.mp3" preload="auto"></audio>
    <script src="/src/leaderboards/fill_or_be_filled/fill-or-be-filled.js"></script>
</body>
</html>
